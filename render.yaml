services:
  - type: web
    name: obsidian-notes
    runtime: python
    rootDir: dashboard
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: false
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: GITHUB_REPO
        value: gerrit0492-create/Obsidian
      - key: GITHUB_BRANCH
        value: main
